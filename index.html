<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <meta name="description" content="Generate geometric GrapheneOS-style wallpapers and export them to WebP/PNG — fully offline, in your browser.">
  <title>GrapheneOS Wallpaper Studio</title>
  <link rel="stylesheet" href="./src/style.css">

  <!-- PWA: installable, offline-capable. Relative paths so it works under the
       GitHub Pages project subpath (and file://). -->
  <link rel="manifest" href="./manifest.webmanifest">
  <meta name="theme-color" content="#05070a">
  <link rel="icon" type="image/svg+xml" href="./icon.svg">
  <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
  <link rel="apple-touch-icon" href="./icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Wallpapers">
</head>
<body>
  <main id="app" class="app-shell">
    <section class="preview-stage" aria-label="Wallpaper preview">
      <div class="topbar">
        <div class="identity">
          <p class="eyebrow">GrapheneOS</p>
          <h1>Wallpaper Studio</h1>
          <p id="device-line">
            <span id="device-name"></span>
            <span class="dot" aria-hidden="true">/</span>
            <span id="device-size"></span>
          </p>
        </div>
        <div class="top-actions">
          <button id="open-style" type="button" class="ghost-btn" aria-haspopup="dialog" title="Change wallpaper style">Style</button>
          <button id="download-png" type="button" class="accent-btn">Export</button>
        </div>
      </div>

      <div id="preview-shell" class="preview-shell">
        <div id="preview" class="preview"></div>
        <div id="render-badge" class="render-badge" role="status" aria-live="polite" hidden>
          <span class="render-badge__dot" aria-hidden="true"></span>Rendering…
        </div>
      </div>
    </section>

    <section class="controls-stage" aria-label="Wallpaper controls">
      <form id="controls" autocomplete="off">
        <div class="tabbar" role="tablist" aria-label="Control sections" style="--tabs: 4; --active: 0;">
          <button type="button" class="tab is-active" role="tab" aria-selected="true" data-tab="setup">Setup</button>
          <button type="button" class="tab" role="tab" aria-selected="false" data-tab="form">Form</button>
          <button type="button" class="tab" role="tab" aria-selected="false" data-tab="color">Color</button>
          <button type="button" class="tab" role="tab" aria-selected="false" data-tab="export">Export</button>
          <span class="tab-indicator" aria-hidden="true"></span>
        </div>

        <div class="panels">
          <!-- SETUP -->
          <section class="panel" role="tabpanel" data-panel="setup" aria-label="Setup">
            <div class="panel-head">
              <h2>Setup</h2>
              <button id="reset-controls" type="button" class="ghost-btn small">Reset all</button>
            </div>

            <label class="field">
              <span class="field-label">Device</span>
              <select id="device"></select>
            </label>

            <label class="field" data-styles="lattice">
              <span class="field-label">Palette</span>
              <select id="palette"></select>
            </label>
            <div id="style-setup-controls"></div>

            <div class="group-label" data-styles="lattice">Display</div>
            <div class="toggle-group" data-styles="lattice" aria-label="Display toggles">
              <label class="chip-toggle">
                <input id="showBrand" type="checkbox">
                <span>Mark</span>
              </label>
              <label class="chip-toggle">
                <input id="showWordmark" type="checkbox">
                <span>Wordmark</span>
              </label>
              <label class="chip-toggle">
                <input id="grain" type="checkbox">
                <span>Grain</span>
              </label>
              <label class="chip-toggle">
                <input id="useOfficialLogo" type="checkbox">
                <span>Official<br />Logo</span>
              </label>
            </div>


            <div class="group-label">Sensor</div>
            <div class="toggle-group" aria-label="Sensor toggles">
              <label class="chip-toggle">
                <input id="fingerprintEnabled" type="checkbox">
                <span>Fingerprint</span>
              </label>
              <label class="chip-toggle sensor-group">
                <input id="sensorLogo" type="checkbox">
                <span>Sensor<br />logo</span>
              </label>
            </div>
            <div class="control-list sensor-group">
              <label class="field range">
                <span class="field-label">Position X</span>
                <input id="fingerprintXPct" type="range" min="35" max="65" step="0.1">
              </label>
              <label class="field range">
                <span class="field-label">Position Y</span>
                <input id="fingerprintYPct" type="range" min="64" max="86" step="0.1">
              </label>
              <label class="field range">
                <span class="field-label">Size</span>
                <input id="fingerprintRadiusPct" type="range" min="8" max="24" step="0.1">
              </label>
              <label class="field range">
                <span class="field-label">Ring opacity</span>
                <input id="fingerprintRingOpacity" type="range" min="0" max="1" step="0.01">
              </label>
            </div>

            <div class="group-label" data-styles="topographic constellation flow bokeh modulation facets matrix crashdump keepcalm forge">Composition</div>
            <div class="control-list" data-styles="topographic constellation flow bokeh modulation matrix crashdump keepcalm forge">
              <label class="field range">
                <span class="field-label">Position X</span>
                <input id="compositionXPct" type="range" min="0" max="100" step="0.5">
              </label>
              <label class="field range">
                <span class="field-label">Position Y</span>
                <input id="compositionYPct" type="range" min="0" max="100" step="0.5">
              </label>
            </div>

            <div class="group-label">Seed</div>
            <div class="seed-row">
              <input id="seed" type="number" min="1" max="4294967295" step="1" aria-label="Random seed" readonly>
              <button id="seed-edit" type="button" class="icon-btn" aria-label="Edit seed" title="Edit seed">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5Z"/></svg>
              </button>
              <button id="seed-copy" type="button" class="icon-btn" aria-label="Copy seed" title="Copy seed">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              </button>
              <button id="reseed" type="button" class="icon-btn" aria-label="Randomize seed" title="Randomize seed">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
              </button>
            </div>
          </section>

          <!-- FORM -->
          <section class="panel" role="tabpanel" data-panel="form" aria-label="Form" hidden>
            <div class="panel-head">
              <h2>Form</h2>
            </div>

            <div class="control-list" data-styles="lattice">
              <label class="field range">
                <span class="field-label">Density</span>
                <input id="structureDensity" type="range" min="0.2" max="1" step="0.01">
              </label>
              <label class="field range">
                <span class="field-label">Scale X</span>
                <input id="unitX" type="range" min="50" max="190" step="1">
              </label>
              <label class="field range">
                <span class="field-label">Scale Y</span>
                <input id="unitY" type="range" min="30" max="115" step="1">
              </label>
              <label class="field range">
                <span class="field-label">Depth</span>
                <input id="unitZ" type="range" min="60" max="210" step="1">
              </label>
              <label class="field range">
                <span class="field-label">Axis X</span>
                <input id="geometryOffsetX" type="range" min="-4" max="4" step="0.05">
              </label>
              <label class="field range">
                <span class="field-label">Axis Y</span>
                <input id="geometryOffsetY" type="range" min="-4" max="4" step="0.05">
              </label>
              <label class="field range">
                <span class="field-label">Axis Z</span>
                <input id="geometryOffsetZ" type="range" min="-3" max="3" step="0.05">
              </label>
              <label class="field range">
                <span class="field-label">Origin X</span>
                <input id="originXPct" type="range" min="25" max="75" step="0.1">
              </label>
              <label class="field range">
                <span class="field-label">Origin Y</span>
                <input id="originYPct" type="range" min="42" max="82" step="0.1">
              </label>
              <label class="field range">
                <span class="field-label">Scaffold</span>
                <input id="topScaffoldOpacity" type="range" min="0" max="0.16" step="0.005">
              </label>
              <label class="field range">
                <span class="field-label">Lines</span>
                <input id="latticeOpacity" type="range" min="0.05" max="0.7" step="0.01">
              </label>
              <label class="field range">
                <span class="field-label">Nodes</span>
                <input id="nodeOpacity" type="range" min="0" max="0.8" step="0.01">
              </label>
            </div>

            <div id="style-form-controls"></div>
          </section>

          <!-- COLOR -->
          <section class="panel" role="tabpanel" data-panel="color" aria-label="Color" hidden>
            <div class="panel-head">
              <h2>Color</h2>
            </div>

            <div class="style-group" data-styles="lattice">
            <div class="group-label">Accents</div>
            <div class="field-grid three">
              <label class="field color">
                <span class="field-label">Accent A</span>
                <input id="accent" type="color">
              </label>
              <label class="field color">
                <span class="field-label">Accent B</span>
                <input id="accent2" type="color">
              </label>
              <label class="field color">
                <span class="field-label">Line</span>
                <input id="lineColor" type="color">
              </label>
            </div>

            <div class="group-label">Background</div>
            <div class="field-grid three">
              <label class="field color">
                <span class="field-label">Top</span>
                <input id="backgroundTop" type="color">
              </label>
              <label class="field color">
                <span class="field-label">Middle</span>
                <input id="backgroundMid" type="color">
              </label>
              <label class="field color">
                <span class="field-label">Bottom</span>
                <input id="backgroundBottom" type="color">
              </label>
            </div>

            <div class="control-list">
              <label class="field range">
                <span class="field-label">Accent strength</span>
                <input id="accentOpacity" type="range" min="0.04" max="0.45" step="0.01">
              </label>
            </div>
            </div><!-- /lattice -->

            <div id="style-color-controls"></div>
          </section>

          <!-- EXPORT -->
          <section class="panel" role="tabpanel" data-panel="export" aria-label="Export" hidden>
            <div class="panel-head">
              <h2>Export</h2>
            </div>

            <div class="field-grid two">
              <label class="field">
                <span class="field-label">Width</span>
                <input id="width" type="number" min="320" max="4096" step="1">
              </label>
              <label class="field">
                <span class="field-label">Height</span>
                <input id="height" type="number" min="320" max="4096" step="1">
              </label>
            </div>

            <label class="field">
              <span class="field-label">Raster format</span>
              <select id="exportFormat">
                <option value="image/webp">WebP</option>
                <option value="image/jpeg">JPEG</option>
                <option value="image/png">PNG</option>
              </select>
            </label>

            <div class="control-list">
              <label class="field range">
                <span class="field-label">Quality</span>
                <input id="rasterQuality" type="range" min="0.5" max="0.95" step="0.05">
              </label>
              <label class="field range">
                <span class="field-label">Scale</span>
                <input id="pngScale" type="range" min="0.35" max="1" step="0.05">
              </label>
            </div>

            <button id="download-svg" type="button" class="ghost-btn export-svg-btn">Download SVG</button>

            <p class="hint">The header <strong>Export</strong> button saves a raster (WebP/JPEG stay small; PNG is lossless but large with grain). <strong>Download SVG</strong> saves the vector source.</p>
          </section>
        </div>
      </form>
    </section>

    <!-- Style picker. Opened by the "Style" button in the header. Holds the
         .style-opt[data-style] buttons (built by app.js) so the active style is
         chosen here rather than from a persistent strip. -->
    <dialog id="style-modal" aria-label="Choose wallpaper style">
      <form method="dialog" class="style-modal-card">
        <div class="picker-head">
          <strong id="style-modal-title">Style</strong>
          <button type="submit" value="close" class="ghost-btn small">Done</button>
        </div>
        <div class="style-toggle" role="tablist" aria-label="Wallpaper style"></div>
      </form>
    </dialog>
  </main>
  <script src="./src/core.js"></script>
  <script src="./src/styles/lattice.js"></script>
  <script src="./src/styles/topographic.js"></script>
  <script src="./src/styles/constellation.js"></script>
  <script src="./src/styles/flow.js"></script>
  <script src="./src/styles/circuit.js"></script>
  <script src="./src/styles/bokeh.js"></script>
  <script src="./src/styles/facets.js"></script>
  <script src="./src/styles/sonar.js"></script>
  <script src="./src/styles/truchet.js"></script>
  <script src="./src/styles/modulation.js"></script>
  <script src="./src/styles/matrix.js"></script>
  <script src="./src/styles/crashdump.js"></script>
  <script src="./src/styles/keepcalm.js"></script>
  <script src="./src/styles/forge.js"></script>
  <script src="./src/app.js"></script>

  <!-- Register the service worker for offline use + installability. Secure-context
       only, so it no-ops harmlessly on file://. Never blocks first paint. -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("./sw.js").catch(function () {});
      });
    }
  </script>
</body>
</html>
